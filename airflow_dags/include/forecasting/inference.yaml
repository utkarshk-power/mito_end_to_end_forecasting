## YAML file for inference stage in Load Forecasting
temperature:
  latitude: 36.345
  longitude: 140.465
  hourly: temperature_2m
  timezone: UTC
  forecast_horizon_days: 3
  api_url: "https://api.open-meteo.com/v1/forecast"
  output: data/inference/raw/only_temperature/hourly_temperature_data.csv

lag_data:
  load_fields:
    - "actualNetLoad"
  output: data/inference/raw/data_without_temperature/inference_lag_data.csv
  lag_start_date: "2026-1-10 07:00:00"
  lag_end_date: "2026-1-10 12:00:00"

preprocess_infer:
  input_temperature: data/inference/raw/only_temperature/hourly_temperature_data.csv
  input_load: data/inference/raw/data_without_temperature/inference_lag_data.csv
  output: data/inference/raw/data_with_temperature/inference_input_data.csv
  lag_time: 5
  cols_needed:
    - temperature
    - netload_lag1
    - netload_lag2
    - netload_lag3
    - netload_lag4
    - netload_lag5
    - Month
    - Day_of_Week
    - DayOfYear
    - Hour
  temp_start_date: "2026-1-10 13:00:00"
  temp_end_date: "2026-1-13 12:00:00"

predict:
  model: models/model.pkl
  input: data/inference/raw/data_with_temperature/inference_input_data.csv
  output: data/inference/predictions/inference_predictions_
  resume: false

new_data_params:
  fields: "actualNetLoad"
  measurement: "FncPvSc"
  output_file: "latest_data/latest_site_data.csv"

data_drift:
  reference_training_data: data/inference/reference_training_data/reference_data.csv
  reference_recent_data: data/inference/reference_recent_data/recent_data.csv
  production_data: data/inference/processed/latest_site_data_processed.csv
  drift_features: ["temperature", "netload_lag1", "netload_lag2", "netload_lag3", "netload_lag4", "netload_lag5"]
  columns: ["FeatureType", "SiteID", "Type", "SeasonBin", "HourBin", "DayType", "IsHoliday", "Value"]
  min_ref_samples_for_iqr: 5
  min_ref_samples_for_drift: 4
  output_file: "latest_data/latest_data_drift.csv"
  
data_drift_trigger:  
  static_warning_mild_threshold: 0.75
  static_warning_strong_threshold: 1.25
  recent_warning_mild_threshold: 0.5
  recent_warning_strong_threshold: 1.0
  static_retrain_min_cycle: 12
  recent_retrain_min_cycle: 6


  